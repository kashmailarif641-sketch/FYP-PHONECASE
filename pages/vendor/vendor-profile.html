<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Vendor Profile | CaseCraft</title>
  <link rel="stylesheet" href="../../css/vendor-profile.css">

  <!-- Flaticon Uicons -->
  <link rel='stylesheet'
    href='https://cdn-uicons.flaticon.com/uicons-regular-rounded/css/uicons-regular-rounded.css'>
</head>

<body>

  <!-- Sidebar -->
  <aside class="vendor-sidebar">
    <h2 class="logo">Vendor Panel</h2>
    <nav class="vendor-nav">
      <ul>
        <li><a href="vendor-dashboard.html"><i class="fi fi-rr-apps"></i> Dashboard</a></li>
        <li><a href="assigned-orders.html"><i class="fi fi-rr-clipboard-list"></i> Assigned Orders</a></li>
        <li><a href="vendor-payment.html"><i class="fi fi-rr-dollar"></i> Payments</a></li>
        <li><a href="vendor-profile.html" class="active"><i class="fi fi-rr-user"></i> Profile</a></li>
        <li><a href="../../login.html"><i class="fi fi-rr-sign-out-alt"></i> Logout</a></li>
      </ul>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="vendor-main">

    <header class="dashboard-header">
      <h1>My Profile</h1>
      <p>Manage your personal information</p>
    </header>

    <div class="profile-container">

      <div class="profile-image-section">
        <img id="profilePreview" src="https://via.placeholder.com/120" alt="Profile Image">
        <input type="file" id="profileImage">
      </div>

      <form id="profileForm">

        <div class="input-group">
          <label>Full Name</label>
          <input type="text" id="fullName" required>
        </div>

        <div class="input-group">
          <label>Email</label>
          <input type="email" id="email" required>
        </div>

        <div class="input-group">
          <label>Phone Number</label>
          <input type="text" id="phone" required>
        </div>

        <div class="input-group">
          <label>Address</label>
          <input type="text" id="address" required>
        </div>

        <div class="input-group">
          <label>City</label>
          <input type="text" id="city" required>
        </div>

        <div class="input-group">
          <label>Country</label>
          <input type="text" id="country" required>
        </div>

        <div class="input-group">
          <label>Change Password</label>
          <input type="password" id="password">
        </div>

        <button type="submit" class="save-btn">Save Changes</button>

      </form>
    </div>

  </main>

  <script src="../../js/vendor-profile.js"></script>
</body>

</html>
