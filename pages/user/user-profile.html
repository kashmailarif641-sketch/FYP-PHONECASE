<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CaseCraft | User Profile</title>

  <!-- CSS -->
  <link rel="stylesheet" href="../../css/user-dashboard.css" />
  <link rel="stylesheet" href="../../css/user-sidebar.css" />
  <link rel="stylesheet" href="../../css/user-profile.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/uicons-regular-rounded/css/uicons-regular-rounded.css'>
</head>

<body>

  <!-- ===== Dashboard Wrapper ===== -->
  <div class="dashboard-wrapper">

    <!-- ===== Sidebar ===== -->
    <aside class="sidebar">
      <div class="logo">CaseCraft</div>
      <ul class="menu">
        <li><a href="user-dashboard.html"><i class="fi fi-rr-home"></i> Home</a></li>
        <li><a href="design-studio.html"><i class="fi fi-rr-magic-wand"></i> Create Design</a></li>
        <li><a href="my-designs.html"><i class="fi fi-rr-picture"></i> My Designs</a></li>
        <li><a href="order-history.html"><i class="fi fi-rr-shopping-bag"></i> Orders</a></li>
        <li class="active"><a href="user-profile.html"><i class="fi fi-rr-user"></i> Profile</a></li>
        <li><a href="../../home.html"><i class="fi fi-rr-sign-out-alt"></i> Logout</a></li>
      </ul>
    </aside>

    <!-- ===== Main Content ===== -->
    <main class="content-area">

      <!-- Page Header -->
      <section class="page-header">
        <h1>My Profile</h1>
        <p>Manage your account information and settings below.</p>
      </section>

      <!-- ===== Profile Section ===== -->
      <section class="profile-container">

        <!-- Profile Image Section -->
        <div class="profile-image">

          <div class="avatar-wrapper">
            <img id="profilePic" />
            <div id="avatarLetter" class="avatar-letter"></div>
          </div>

          <label for="uploadPic" class="upload-btn">Change Photo</label>
          <input type="file" id="uploadPic" accept="image/*" />

        </div>

        <!-- Profile Info Section -->
        <div class="profile-info">

          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="fullName" />
          </div>

          <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" readonly />
          </div>

          <div class="form-group">
            <label>Phone Number</label>
            <input type="text" id="phone" />
          </div>

          <div class="form-group">
            <label>Address</label>
            <textarea rows="3" id="address"></textarea>
          </div>

          <div class="form-group">
            <label>JazzCash Number</label>
            <input type="text" id="jazzcash" placeholder="Enter JazzCash Number">
          </div>

          <div class="profile-actions">
            <button class="save-btn">Save Changes</button>
            <button type="button" class="change-password-btn">Change Password</button>
          </div>

        </div>

      </section>

      <!-- ===== Footer ===== -->
      <footer class="footer">
        <p>&copy; 2025 CaseCraft. All rights reserved.</p>
      </footer>

    </main>

    <div id="passwordModal" class="modal">
      <div class="modal-content">
        <h2>Change Password</h2>

        <input type="password" id="currentPassword" placeholder="Current Password" />
        <input type="password" id="newPassword" placeholder="New Password" />
        <input type="password" id="confirmPassword" placeholder="Confirm New Password" />

        <div class="modal-actions">
          <button id="updatePasswordBtn">Update Password</button>
          <button id="closeModalBtn">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../../js/user-profile.js"></script>
</body>

</html>
