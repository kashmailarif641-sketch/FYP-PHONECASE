<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CaseCraft | Order</title>
  <link rel="stylesheet" href="../../css/order.css">
  <style>
  </style>
</head>

<body>
  <!-- Header -->
  <header class="site-header">
    <div class="logo">CaseCraft</div>

  </header>

  <!-- Main Content -->
  <main class="order-container">
    <!-- Design Preview -->
    <section class="design-preview">
      <h2>Your Selected Case Design</h2>
      <div class="preview-box">
        <img id="orderDesignImg" src="../../images/placeholder-case.png" alt="Selected Case Design">
      </div>
    </section>

    <!-- Order Details -->
    <section class="order-details">
      <h2>Enter Delivery & Payment Details</h2>
      <form>
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" placeholder="Enter your full name">
        </div>

        <div class="form-group">
          <label>Delivery Address</label>
          <textarea rows="3" placeholder="Enter complete address"></textarea>
        </div>

        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" placeholder="03XX-XXXXXXX">
        </div>

        <div id="brandModelDisplay" class="form-group row" style="display: none;">
          <div class="col-half">
            <label>Selected Brand</label>
            <div class="display-box" id="selectedBrand">Not Selected</div>
          </div>
          <div class="col-half">
            <label>Selected Model</label>
            <div class="display-box" id="selectedModel">Not Selected</div>
          </div>
        </div>

        <div id="deviceDropdownContainer" class="form-group row" style="display: none;">
          <div class="col-half">
            <label for="brandSelect">Selected Brand</label>
            <select id="brandSelect">
              <option value="">Select Brand</option>
            </select>
          </div>
          <div class="col-half">
            <label for="modelSelect">Selected Model</label>
            <select id="modelSelect">
              <option value="">Select Model</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="material">Material</label>
          <select id="material">
            <option value="">Select Material</option>
            <option value="Standard">Standard</option>
            <option value="Premium">Premium (+300)</option>
            <option value="Transparent">Transparent (+200)</option>
            <option value="Matte">Matte (+150)</option>
            <option value="Glossy">Glossy (+150)</option>
          </select>
        </div>

        <div class="premium-option">
          <label>
            <input type="checkbox" id="premiumDesign">
            Submit this design for Premium Gallery
          </label>
        </div>

        <div id="premiumPriceBox" style="display: none; margin-top: 10px;">
          <label for="premiumPrice">Set Your Selling Price (Rs.)</label>
          <input type="number" id="premiumPrice" placeholder="Enter amount e.g. 3000" min="1">
        </div>

        <div class="form-group">
          <label>Total Price</label>
          <div class="display-box price-highlight" id="totalPriceDisplay">Rs. 0</div>
        </div>

        <div class="form-group">
          <label>Payment Method</label>
          <select id="paymentMethodSelect">
            <option disabled selected>Select payment method</option>
            <option value="cod">Cash on Delivery</option>
            <option value="jazzcash">Easypaisa / JazzCash</option>
          </select>
        </div>

        <!-- Digital Payment Details (Hidden by default) -->
        <div id="digitalPaymentDetails"
          style="display: none; background: #e0f2fe; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #bae6fd;">
          <p style="margin-bottom: 10px; color: #0369a1; font-size: 0.9rem;">
            <strong>Instructions:</strong> Please send <span id="paymentAmount" style="font-weight:bold;">Total
              Amount</span> to:
            <br>Account: <strong>0300-1234567</strong> (CaseCraft Admin)
            <br>Type: JazzCash / Easypaisa
          </p>
          <div class="form-group">
            <label>Transaction ID (Trx ID)</label>
            <input type="text" id="trxId" placeholder="Enter Transaction ID from SMS">
          </div>
        </div>

        <button type="button" id="confirmOrderBtn" class="confirm-btn">Confirm Order</button>
      </form>
    </section>
  </main>

  <script src="../../js/order.js"></script>


  <!-- Footer -->
  <footer class="site-footer">
    <p>© 2025 CaseCraft. All rights reserved.</p>
  </footer>
</body>

</html>
