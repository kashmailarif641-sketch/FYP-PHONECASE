<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premium Gallery | CaseCraft</title>
  <link rel="stylesheet" href="css/home.css" />
  <link rel="stylesheet" href="css/premium-gallery.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script defer src="js/premium-gallery.js"></script>
</head>

<body>
  <!-- ===== Header ===== -->
  <header class="site-header">
    <div class="logo">CaseCraft</div>
  </header>

  <!-- ===== Hero Section ===== -->
  <section class="hero">
    <div class="hero-text">
      <h1>🌟 Premium Gallery</h1>
      <p>Explore top-rated, admin-approved designs ready for ordering.</p>
    </div>
    <div class="hero-image">
      <img src="images/premium.png" alt="Premium Designs" />
    </div>
  </section>

  <!-- ===== Gallery Section ===== -->
  <section class="gallery">
    <!-- Filters will be injected here by JS -->
    <div class="filter-container" id="categoryFilters"
      style="display:flex; justify-content:center; gap:10px; margin-bottom:30px; flex-wrap:wrap;"></div>

    <h2>Featured Premium Designs</h2>
    <p>Choose a premium design and order it instantly!</p>

    <div class="design-grid" id="premiumGrid"></div>
  </section>

  <!-- ===== Footer ===== -->
  <footer class="site-footer">
    <p>© 2025 CaseCraft. All Rights Reserved.</p>
  </footer>
</body>

</html>
