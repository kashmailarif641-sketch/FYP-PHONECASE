<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premium Gallery | CaseCraft</title>
  <link rel="stylesheet" href="css/home.css" />
  <link rel="stylesheet" href="css/premium-gallery.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script defer src="js/premium-gallery.js"></script>
</head>

<body>
  <!-- Announcements Banner -->
  <div id="announcementBanner"
    style="display:none; background:#020842; color:white; text-align:center; padding:10px; font-size:14px; position:relative;">
    <span id="announcementText"></span>
    <button onclick="this.parentElement.style.display='none'"
      style="background:none; border:none; color:white; float:right; cursor:pointer; font-size:16px; margin-right:10px;">&times;</button>
  </div>

  <header class="site-header">
    <div class="logo">CaseCraft</div>
    <button class="nav-toggle" aria-label="Toggle navigation"><i class="fa-solid fa-bars"></i></button>
    <nav class="nav-links">
      <a href="home.html">Home</a>
      <a href="premium-gallery.html" class="active">Premium Gallery</a>
    </nav>
  </header>

  <!-- ===== Hero Section ===== -->
  <section class="hero">
    <div class="hero-text">
      <h1>🌟 Premium Gallery</h1>
      <p>Explore top-rated, admin-approved designs ready for ordering.</p>
    </div>
    <div class="hero-image">
      <img src="images/premium.png" alt="Premium Designs" />
    </div>
  </section>

  <!-- ===== Gallery Section ===== -->
  <section class="gallery">
    <h2>Featured Premium Designs</h2>
    <p>Choose a premium design and order it instantly!</p>

    <div id="galleryContainer"></div>
  </section>

  <!-- ===== Footer ===== -->
  <footer class="site-footer">
    <p>© 2025 CaseCraft. All Rights Reserved.</p>
  </footer>
</body>

</html>
