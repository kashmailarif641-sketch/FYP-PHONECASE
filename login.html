<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

    <div class="container">
        <div class="login-card">

            <img src="images/login.jpg" class="logo">

            <h2>Welcome Back!</h2>
            <p class="subtitle">Please login to continue</p>

            <form id="loginForm">

                <input id="email" name="email" type="email" placeholder="Email" required>
                <span class="error-msg" id="emailError"></span>
                <div class="password-container">
                    <input id="password" name="password" type="password" placeholder="Password" required>
                    <i class="fas fa-eye-slash toggle-password" onclick="togglePassword('password', this)"></i>
                </div>
                <span class="error-msg" id="passwordError"></span>

                <div class="remember">
                    <label><input id="rememberMe" name="remember" type="checkbox"> Remember me</label>
                    <a href="#" class="forget">Forget Password?</a>
                </div>

                <select id="role" name="role" required>
                    <option value="">Select Role</option>
                    <option value="Admin">Admin</option>
                    <option value="Vendor">Vendor</option>
                    <option value="User">User</option>
                </select>
                <span class="error-msg" id="roleError"></span>

                <button type="submit" class="login-btn">Login</button>

            </form>

            <p class="signup">Don’t have an account? <a href="signup.html">Sign Up</a></p>

        </div>
    </div>

    <script src="js/login.js"></script>
</body>

</html>
